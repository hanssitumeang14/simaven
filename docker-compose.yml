services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: simaven
      POSTGRES_PASSWORD: simaven
      POSTGRES_DB: simaven
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simaven"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://simaven:simaven@db:5432/simaven
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:8080"]'
      ENVIRONMENT: docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
