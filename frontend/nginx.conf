server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # PDF SPK bisa besar, jangan di-buffer habis-habisan
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
